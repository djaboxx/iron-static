name: Feed Digest

on:
  schedule:
    - cron: '0 7 * * *'   # Every day at 07:00 UTC
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Override output date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''
      max_age:
        description: 'Max item age in days (default: 7)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  feed-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --quiet google-genai feedparser

      - name: Run feed digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL_FAST: ${{ vars.GEMINI_MODEL_FAST }}
          GEMINI_MODEL_PRO: ${{ vars.GEMINI_MODEL_PRO }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.date_override }}" ]; then
            ARGS="$ARGS --date ${{ inputs.date_override }}"
          fi
          if [ -n "${{ inputs.max_age }}" ]; then
            ARGS="$ARGS --max-age ${{ inputs.max_age }}"
          fi
          python scripts/run_feed_digest.py $ARGS

      - name: Commit feed digest
        run: |
          git config user.name "iron-static-bot"
          git config user.email "bot@iron-static.local"
          git add knowledge/references/feeds/
          git diff --staged --quiet || git commit -m "feat(references): daily feed digest [automated]"
          git pull --rebase origin main
          git push
