name: Weekly Brainstorm

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Override output date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  brainstorm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --quiet google-generativeai

      - name: Run brainstorm generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL_FAST: ${{ vars.GEMINI_MODEL_FAST }}
          GEMINI_MODEL_PRO: ${{ vars.GEMINI_MODEL_PRO }}
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date_override }}" ]; then
            DATE_ARG="--date ${{ inputs.date_override }}"
          fi
          python scripts/run_brainstorm.py $DATE_ARG

      - name: Commit brainstorm document
        run: |
          git config user.name "iron-static-bot"
          git config user.email "bot@iron-static.local"
          git add knowledge/brainstorms/
          git diff --staged --quiet || git commit -m "feat(brainstorm): weekly creative brainstorm [automated]"
          git pull --rebase origin main
          git push
