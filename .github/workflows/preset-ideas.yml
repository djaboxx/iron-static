name: Preset Ideas

on:
  schedule:
    - cron: '0 8 * * 4'   # Every Thursday at 08:00 UTC
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Override output date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''
      instrument:
        description: 'Focus on one instrument slug (e.g. rev2, dfam). Leave blank for all.'
        required: false
        default: ''
      no_llm:
        description: 'Skip LLM call (dry run with stubs)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force:
        description: 'Overwrite existing output for today'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  preset-ideas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --quiet google-generativeai

      - name: Run preset idea generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL_FAST: ${{ vars.GEMINI_MODEL_FAST }}
          GEMINI_MODEL_PRO: ${{ vars.GEMINI_MODEL_PRO }}
        run: |
          DATE_ARG=""
          INST_ARG=""
          NO_LLM_ARG=""
          FORCE_ARG=""
          if [ -n "${{ inputs.date_override }}" ]; then
            DATE_ARG="--date ${{ inputs.date_override }}"
          fi
          if [ -n "${{ inputs.instrument }}" ]; then
            INST_ARG="--instrument ${{ inputs.instrument }}"
          fi
          if [ "${{ inputs.no_llm }}" = "true" ]; then
            NO_LLM_ARG="--no-llm"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE_ARG="--force"
          fi
          python scripts/run_preset_ideas.py $DATE_ARG $INST_ARG $NO_LLM_ARG $FORCE_ARG

      - name: Commit preset ideas
        run: |
          git config user.name "iron-static-bot"
          git config user.email "bot@iron-static.local"
          git add knowledge/sound-design/
          git diff --staged --quiet || git commit -m "feat(sound-design): weekly preset ideas [automated]"
          git push
