name: Refresh LOM Docs

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-cache all pages even if unchanged'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  refresh-lom-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run refresh script
        id: refresh
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FLAGS="--force"
          fi
          python scripts/refresh_lom_docs.py $FLAGS --verbose
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated docs and cache
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/lom-api-ref.md database/lom_cache/
          git commit -m "docs: refresh LOM reference — $(date -u +%Y-%m-%d)"
          git push
